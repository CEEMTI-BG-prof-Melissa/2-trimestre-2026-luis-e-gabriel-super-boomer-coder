<!DOCTYPE html>

<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title> Aula 2 - Controle de Formulários </title>
    </head>

    <body>
        <h1> Preferências </h1>
        <form action="index.html" method="get">

            <!-- Nome -->
            <label for="nome"> Nome: </label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
            <br>

            <!-- Turno -->
            <p> Qual turno você prefere estudar? </p>
            <input type="radio" id="manha" name="turno" value="Manhã">
            <label for="manha"> Manhã </label>
            <br>
            <input type="radio" id="tarde" name="turno" value="Tarde">
            <label for="tarde"> Tarde </label>
            <br>
            <input type="radio" id="noite" name="turno" value="Noite">
            <label for="noite"> Noite </label>
            <br><br>
            
            <!-- Área -->
            <p> Quais áreas da tecnologia você tem interesse? </p>
            <input type="checkbox" id="progamacao" name="area" value="Progamação">
            <label for="progamacao"> Progamação </label>
            <br>
            <input type="checkbox" id="desing" name="area" value="Desing">
            <label for="desing"> Desing </label>
            <br>
            <input type="checkbox" id="bancodados" name="area" value="BancoDeDados">
            <label for="bancodados"> Banco de Dados </label>
            <br>
            <input type="checkbox" id="redes" name="area" value="Redes">
            <label for="redes"> Redes </label>
            <br><br>

            <!-- Cor Favorita -->
            <label for="corfav"> Qual a sua cor favorita? </label>
            <input type="color" id="corfav" name="cor_favorita">
            <br><br>

            <!-- Nível de Satisfação -->
            <label for="satisfacao"> Qual o seu nível de satisfação? </label>
            <input type="range" id="satisfacao" name="satisfação">
            <br><br>

            <!-- Horário Preferido -->
            <label for="horario"> Qual o seu horário preferido? </label>
            <input type="time" id="horario" name="horario">
            <br><br>

            <!-- Envio de Arquivo -->
            <label for="arquivo"> Envie um arquivo </label>
            <input type="file" id="arquivo" name="arquivo">
            <br><br>

            <!-- Cadastrar -->
            <input type="submit" value="Cadastrar">

            <!-- Limpar -->
            <input type="reset" value="Limpar">
        </form>
    </body>
</html>
